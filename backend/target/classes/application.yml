server:
  port: 8080

spring:
  application:
    name: media-publish-backend
  
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:~/media_publish;AUTO_SERVER=TRUE;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

app:
  upload:
    path: /home/coze/publish/uploads
  encryption:
    secret-key: media-publish-secret-key-2024
